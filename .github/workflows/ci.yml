name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Copy Linux native module
        if: runner.os == 'Linux'
        run: |
          ARCH=$(uname -m | sed 's/x86_64/x64/' | sed 's/aarch64/arm64/')
          TARGET="linux-${ARCH}"
          mkdir -p node_modules/node-pty/prebuilds/${TARGET}
          cp node_modules/node-pty/build/Release/pty.node node_modules/node-pty/prebuilds/${TARGET}/
          # spawn-helper may be in build/Release or prebuilds
          if [ -f node_modules/node-pty/build/Release/spawn-helper ]; then
            cp node_modules/node-pty/build/Release/spawn-helper node_modules/node-pty/prebuilds/${TARGET}/
          fi

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test
