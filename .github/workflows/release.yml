name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            targets: darwin-arm64 darwin-x64
          - os: ubuntu-latest
            targets: linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Package per-platform tarballs
        run: |
          VERSION="${GITHUB_REF_NAME}"
          for target in ${{ matrix.targets }}; do
            STAGING="subagent-cli-${VERSION}-${target}"
            mkdir -p "${STAGING}/lib/${target}"

            cp dist/cli.js dist/app.js dist/subagent-cli "${STAGING}/"
            cp dist/lib/${target}/* "${STAGING}/lib/${target}/"

            tar czf "${STAGING}.tar.gz" "${STAGING}"
            echo "Created ${STAGING}.tar.gz"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: subagent-cli-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: subagent-cli-*.tar.gz
