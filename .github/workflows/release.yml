name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            targets: darwin-arm64 darwin-x64
          - os: ubuntu-latest
            targets: linux-x64

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Copy Linux native module
        if: runner.os == 'Linux'
        run: |
          ARCH=$(uname -m | sed 's/x86_64/x64/' | sed 's/aarch64/arm64/')
          TARGET="linux-${ARCH}"
          mkdir -p node_modules/node-pty/prebuilds/${TARGET}
          cp node_modules/node-pty/build/Release/pty.node node_modules/node-pty/prebuilds/${TARGET}/
          HELPER=$(find node_modules/node-pty/build -name spawn-helper 2>/dev/null | head -1)
          if [ -z "$HELPER" ] && [ -f node_modules/node-pty/src/unix/spawn-helper.cc ]; then
            echo "Compiling spawn-helper from source..."
            gcc -o node_modules/node-pty/prebuilds/${TARGET}/spawn-helper node_modules/node-pty/src/unix/spawn-helper.cc
          elif [ -n "$HELPER" ]; then
            cp "$HELPER" node_modules/node-pty/prebuilds/${TARGET}/
          fi
          chmod +x node_modules/node-pty/prebuilds/${TARGET}/spawn-helper 2>/dev/null || true

      - name: Build
        run: npm run build

      - name: Unit tests
        run: npm test

      - name: Package per-platform tarballs
        run: |
          VERSION="${GITHUB_REF_NAME}"
          for target in ${{ matrix.targets }}; do
            STAGING="subagent-cli-${VERSION}-${target}"
            mkdir -p "${STAGING}/lib/${target}"

            cp dist/cli.js dist/app.js dist/subagent-cli "${STAGING}/"
            cp dist/lib/${target}/* "${STAGING}/lib/${target}/"

            tar czf "${STAGING}.tar.gz" "${STAGING}"
            echo "Created ${STAGING}.tar.gz"
          done

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: subagent-cli-*.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          BODY=$(sed -n "/^## \[${VERSION}\]/,/^## \[/{ /^## \[${VERSION}\]/d; /^## \[/d; p; }" CHANGELOG.md)
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.body }}
          files: subagent-cli-*.tar.gz
